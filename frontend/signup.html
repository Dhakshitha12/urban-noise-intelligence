<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Urban Noise Intelligence Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="navbar">
        <h2>Urban Noise Intelligence</h2>
        <nav>
            <button class="btn btn-secondary btn-sm" onclick="toggleMode()">Toggle Theme</button>
        </nav>
    </div>

    <div class="container animate-fade-in">
        <div class="auth-container">
            <div class="card">
                <h2>Create Account</h2>
                <p class="mb-4" style="color: var(--text-muted)">Join to get access to real-time urban noise analytics.</p>

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <button class="btn btn-block mt-2" onclick="signup()">Sign Up</button>

                <p class="mt-4" style="font-size: 0.9rem; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
